# LNAIME — コンテナ駆動の「脳」（SearXNG式）。`docker compose up -d --build`
services:
  brain:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: lnaime-brain:dev
    container_name: lnaime-brain
    ports:
      - "8077:8000"          # http://localhost:8077
    volumes:
      - ./dict:/app/dict:ro      # master.yaml を編集 → /dict/reload で即反映
      - ./drafts:/app/drafts:rw  # 原稿の蔵 — drafts persist on THIS box (SAZANAMI), never on a client
    environment:
      - LNAIME_DRAFTS=/app/drafts
    restart: unless-stopped

  convert:                  # zenz 変換（GPU）。明示起動: docker compose --profile gpu up -d convert
    image: lnaime-convert:dev
    container_name: lnaime-convert
    profiles: ["gpu"]
    ports:
      - "8078:8000"         # http://127.0.0.1:8078
    volumes:
      - ./models/zenz-v3.2-small-gguf/ggml-model-Q5_K_M.gguf:/models/zenz.gguf:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["2"]   # 非ディスプレイの空きGPU
              capabilities: [gpu]
    restart: unless-stopped

  convert-faithful:         # Tier-2 読み忠実ラティス変換（Swift Zenzai, CPU, JSON-Lines/TCP）
    # 事前ビルド: docker build -t lnaime-zenzai:cuda zenzai/
    image: lnaime-zenzai:cuda
    container_name: lnaime-convert-faithful
    environment:
      - ZENZ_DEVICE=CPU
      - ZENZ_WEIGHT=/models/zenz.gguf
      - LNAIME_DICT_VALUE=0
      - LNAIME_TCP_PORT=8000
    ports:
      - "8079:8000"
    volumes:
      - ./models/zenz-v3.2-small-gguf/ggml-model-Q5_K_M.gguf:/models/zenz.gguf:ro
    restart: unless-stopped
