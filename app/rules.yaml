# ら抜き言葉（常用・高精度）
ranuki:
  - {find: 見れる,   to: 見られる}
  - {find: 見れて,   to: 見られて}
  - {find: 食べれる, to: 食べられる}
  - {find: 食べれな, to: 食べられな}
  - {find: 来れる,   to: 来られる}
  - {find: 来れな,   to: 来られな}
  - {find: 出れる,   to: 出られる}
  - {find: 寝れる,   to: 寝られる}
  - {find: 着れる,   to: 着られる}
  - {find: 起きれる, to: 起きられる}
  - {find: 覚えれる, to: 覚えられる}

# 用字用語（補助動詞・あいさつ等をひらく。安全側）
yougo:
  - {find: 出来る,   to: できる}
  - {find: 出来な,   to: できな}
  - {find: 出来ます, to: できます}
  - {find: 下さい,   to: ください,   note: 補助動詞はひらく}
  - {find: 致します, to: いたします, note: 補助動詞はひらく}
  - {find: 頂きます, to: いただきます, note: 補助動詞はひらく}
  - {find: 宜しく,   to: よろしく}
  - {find: 有難う,   to: ありがとう}
